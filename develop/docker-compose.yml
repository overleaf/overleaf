volumes:
  clsi-cache:
  filestore-public-files:
  filestore-template-files:
  filestore-uploads:
  filestore-user-files:
  mongo-data:
  redis-data:
  sharelatex-data:
  web-data:
  history-v1-buckets:

networks:
  # Explicit name so per-user Claude Code containers (spawned by web at
  # runtime) can be attached to the same network regardless of the compose
  # project name. AI_SESSION_NETWORK in dev.env must match this.
  default:
    name: overleaf

services:
  chat:
    build:
      context: ..
      dockerfile: services/chat/Dockerfile
    env_file:
      - dev.env

  clsi:
    build:
      context: ..
      dockerfile: services/clsi/Dockerfile
      target: with-texlive
    env_file:
      - dev.env
    environment:
      - SANDBOXED_COMPILES=false
    user: root
    volumes:
      - ${PWD}/compiles:/overleaf/services/clsi/compiles
      - ${PWD}/output:/overleaf/services/clsi/output
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      - clsi-cache:/overleaf/services/clsi/cache

  clsi-nginx:
    image: nginx:1.28
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run
    volumes:
      - ${PWD}/output:/output:ro
      - ../services/clsi/nginx.conf:/etc/nginx/conf.d/nginx.conf:ro

  contacts:
    build:
      context: ..
      dockerfile: services/contacts/Dockerfile
    env_file:
      - dev.env

  docstore:
    build:
      context: ..
      dockerfile: services/docstore/Dockerfile
    env_file:
      - dev.env

  document-updater:
    build:
      context: ..
      dockerfile: services/document-updater/Dockerfile
    env_file:
      - dev.env

  filestore:
    build:
      context: ..
      dockerfile: services/filestore/Dockerfile
    env_file:
      - dev.env
    #    environment:
    #      - ENABLE_CONVERSIONS=true
    volumes:
      - filestore-public-files:/overleaf/services/filestore/public_files
      - filestore-template-files:/overleaf/services/filestore/template_files
      - filestore-uploads:/overleaf/services/filestore/uploads

  history-v1:
    build:
      context: ..
      dockerfile: services/history-v1/Dockerfile
    env_file:
      - dev.env
    environment:
      OVERLEAF_EDITOR_ANALYTICS_BUCKET: "/buckets/analytics"
      OVERLEAF_EDITOR_BLOBS_BUCKET: "/buckets/blobs"
      OVERLEAF_EDITOR_CHUNKS_BUCKET: "/buckets/chunks"
      OVERLEAF_EDITOR_PROJECT_BLOBS_BUCKET: "/buckets/project_blobs"
      OVERLEAF_EDITOR_ZIPS_BUCKET: "/buckets/zips"
      PERSISTOR_BACKEND: fs
    volumes:
      - history-v1-buckets:/buckets

  mongo:
    image: mongo:8
    command: --replSet overleaf
    volumes:
      - mongo-data:/data/db
      - ../bin/shared/mongodb-init-replica-set.js:/docker-entrypoint-initdb.d/mongodb-init-replica-set.js
    environment:
      MONGO_INITDB_DATABASE: sharelatex
      GLIBC_TUNABLES: glibc.pthread.rseq=1 # fix kernel 7.0+ incompatibility
    extra_hosts:
      - mongo:127.0.0.1

  notifications:
    build:
      context: ..
      dockerfile: services/notifications/Dockerfile
    env_file:
      - dev.env

  project-history:
    build:
      context: ..
      dockerfile: services/project-history/Dockerfile
    env_file:
      - dev.env

  real-time:
    build:
      context: ..
      dockerfile: services/real-time/Dockerfile
    env_file:
      - dev.env

  redis:
    image: redis:7
    # ports commented out - use override if host port needed
    volumes:
      - redis-data:/data

  web:
    build:
      context: ..
      dockerfile: services/web/Dockerfile
      target: dev
    env_file:
      - dev.env
    environment:
      - APP_NAME=Overleaf Community Edition
      - ENABLED_LINKED_FILE_TYPES=project_file,project_output_file
      - EMAIL_CONFIRMATION_DISABLED=true
      - NODE_ENV=development
      - OVERLEAF_ALLOW_PUBLIC_ACCESS=true
    command: ["node", "app.mjs"]
    volumes:
      - sharelatex-data:/var/lib/overleaf
      - web-data:/overleaf/services/web/data
      # AiSessionManager talks to the host's Docker daemon to spawn per-user
      # Claude Code containers. Comment this out (and unset AI_SESSION_IMAGE
      # in dev.env) to disable the feature.
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
    # Web runs as uid 1000; the docker socket is root:docker (gid varies by
    # host). Add the host's docker gid as a supplementary group so dockerode
    # can connect. Override via DOCKER_GID env if your host differs.
    group_add:
      - "${DOCKER_GID:-983}"
    depends_on:
      - mongo
      - redis
      - chat
      - clsi
      - contacts
      - docstore
      - document-updater
      - filestore
      - history-v1
      - notifications
      - project-history
      - real-time

  # Build-only service: produces the per-user Claude Code container image
  # (overleaf/claude-ide:dev) that AiSessionManager spawns on demand.
  # `bin/build` / `docker compose up` build the image automatically; the
  # container itself exits immediately (entrypoint=true) so it stays as
  # "Exited (0)" — we only need the image to exist on the host.
  claude-ide:
    image: overleaf/claude-ide:dev
    build:
      context: ..
      dockerfile: services/claude-ide-container/Dockerfile
    entrypoint: ["true"]
    restart: "no"

  webpack:
    build:
      context: ..
      dockerfile: services/web/Dockerfile
      target: webpack
    command:
      ["npx", "webpack", "serve", "--config", "webpack.config.dev-env.js"]
    ports:
      - "127.0.0.1:80:3808"
    volumes:
      - ./webpack.config.dev-env.js:/overleaf/services/web/webpack.config.dev-env.js
